version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: velora-postgres
    restart: always
    environment:
      POSTGRES_USER: velora
      POSTGRES_PASSWORD: password
      POSTGRES_DB: veloradb
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: velora-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
